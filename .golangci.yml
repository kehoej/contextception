run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gosec
    - gocritic
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow          # too noisy with idiomatic if err := ...; err != nil
  staticcheck:
    checks: ["all", "-SA9003"]  # exclude empty-branch check
  gosec:
    excludes:
      - G104  # unhandled errors in deferred calls (too noisy)
      - G202  # SQL string concatenation (table names are constants, not user input)
      - G204  # subprocess launched with variable args (expected in CLI tool)
      - G306  # file permissions > 0600 (test helper files use 0o644)
  gocritic:
    disabled-checks:
      - appendAssign    # false positive with intentional new-slice idiom
      - ifElseChain     # style preference, not a bug
      - unlambda        # style preference
      - elseif          # style preference
      - badCond         # flags valid equality comparisons

issues:
  exclude-dirs:
    - testdata
    - benchmarks
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    # Test files: unchecked errors and SQL formatting are acceptable.
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # Deferred rollback/unlock/close errors are acceptable.
    - text: "Error return value of `tx\\.Rollback` is not checked"
      linters:
        - errcheck
    - text: "Error return value of `syscall\\.Flock` is not checked"
      linters:
        - errcheck
    # Fire-and-forget recording/meta-setting is acceptable.
    - text: "Error return value of `hist\\.RecordRun` is not checked"
      linters:
        - errcheck
    - text: "Error return value of `idx\\.SetMeta` is not checked"
      linters:
        - errcheck
    # gosimple S1017 in resolver is intentional control flow.
    - path: internal/resolver/
      linters:
        - gosimple
    # assignOp is a style preference.
    - text: "assignOp"
      linters:
        - gocritic
    # SQL string formatting in store is parameterized where needed.
    - path: internal/db/store\.go
      text: "G20[12]"
      linters:
        - gosec
