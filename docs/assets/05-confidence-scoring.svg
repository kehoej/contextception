<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#0a0e1a">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#111830" stroke-width="0.3"/>
    </pattern>

    <!-- Arc clipping for the gauge -->
    <clipPath id="gauge-clip">
      <rect x="200" y="150" width="400" height="200"/>
    </clipPath>
  </defs>

  <rect width="800" height="600" fill="url(#grid)" opacity="0.5"/>

  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a5568" font-weight="bold" letter-spacing="5">
    CONFIDENCE ANALYSIS
  </text>
  <text x="400" y="52" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" letter-spacing="2">
    IMPORT RESOLUTION COMPLETENESS
  </text>

  <!-- ═══ LARGE GAUGE METER ═══ -->
  <g transform="translate(400, 280)">
    <!-- Background arc -->
    <path d="M -180 0 A 180 180 0 0 1 180 0" fill="none" stroke="#1e293b" stroke-width="20" stroke-linecap="round"/>

    <!-- Colored arc segments -->
    <!-- Red zone (0-50%) -->
    <path d="M -180 0 A 180 180 0 0 1 -127.3 -127.3" fill="none" stroke="#ef4444" stroke-width="20" stroke-linecap="round" opacity="0.3" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="0.5s" begin="0.5s" fill="freeze"/>
    </path>

    <!-- Yellow zone (50-80%) -->
    <path d="M -127.3 -127.3 A 180 180 0 0 1 55.6 -171.2" fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round" opacity="0.3" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="0.5s" begin="1s" fill="freeze"/>
    </path>

    <!-- Green zone (80-100%) -->
    <path d="M 55.6 -171.2 A 180 180 0 0 1 180 0" fill="none" stroke="#22c55e" stroke-width="20" stroke-linecap="round" opacity="0.3" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="0.5s" begin="1.5s" fill="freeze"/>
    </path>

    <!-- Active value arc (sweeps to 0.92 = ~166 degrees) -->
    <path d="M -180 0 A 180 180 0 0 1 155.6 -91.3" fill="none" stroke="#22c55e" stroke-width="22" stroke-linecap="round" filter="url(#glow-green)" stroke-dasharray="500" stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset" values="500;78" dur="2s" begin="2s" fill="freeze"/>
    </path>

    <!-- Needle -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
      <line x1="0" y1="0" x2="0" y2="-160" stroke="#22c55e" stroke-width="2" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" values="-180;-14.4" dur="2s" begin="2s" fill="freeze"/>
      </line>
      <circle cx="0" cy="0" r="8" fill="#0a0e1a" stroke="#22c55e" stroke-width="2"/>
    </g>

    <!-- Value text -->
    <text x="0" y="-50" text-anchor="middle" font-family="monospace" font-size="48" fill="#22c55e" font-weight="bold" filter="url(#glow-green)" opacity="0">
      0.92
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.5s" fill="freeze"/>
    </text>
    <text x="0" y="-25" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80" opacity="0">
      CONFIDENCE SCORE
      <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="3.8s" fill="freeze"/>
    </text>

    <!-- Scale labels -->
    <text x="-185" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#ef4444" opacity="0.5">0.0</text>
    <text x="-140" y="-115" text-anchor="middle" font-family="monospace" font-size="12" fill="#f59e0b" opacity="0.5">0.50</text>
    <text x="60" y="-175" text-anchor="middle" font-family="monospace" font-size="12" fill="#22c55e" opacity="0.5">0.80</text>
    <text x="185" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#22c55e" opacity="0.5">1.0</text>
  </g>

  <!-- ═══ IMPORT RESOLUTION BREAKDOWN ═══ -->
  <g transform="translate(60, 370)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="4s" fill="freeze"/>

    <text x="0" y="0" font-family="monospace" font-size="11" fill="#6b7280" font-weight="bold" letter-spacing="2">IMPORT RESOLUTION</text>

    <!-- Resolved imports (green checks) -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="290" height="22" rx="4" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#4ade80">from auth.session import createSession</text>
      <text x="280" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">OK</text>
    </g>
    <g transform="translate(0, 48)">
      <rect x="0" y="0" width="290" height="22" rx="4" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#4ade80">from models.user import User</text>
      <text x="280" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">OK</text>
    </g>
    <g transform="translate(0, 76)">
      <rect x="0" y="0" width="290" height="22" rx="4" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#4ade80">from db.connection import pool</text>
      <text x="280" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">OK</text>
    </g>
    <g transform="translate(0, 104)">
      <rect x="0" y="0" width="290" height="22" rx="4" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#4ade80">from utils.crypto import hash_pw</text>
      <text x="280" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">OK</text>
    </g>
    <g transform="translate(0, 132)">
      <rect x="0" y="0" width="290" height="22" rx="4" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#4ade80">from auth.token import verify</text>
      <text x="280" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">OK</text>
    </g>
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="290" height="22" rx="4" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#4ade80">from config import settings</text>
      <text x="280" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">OK</text>
    </g>

  </g>

  <!-- Resolved count badge (rendered after both groups so it's on top) -->
  <g transform="translate(388, 488)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="4s" fill="freeze"/>
    <circle cx="0" cy="0" r="30" fill="#0a0e1a" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="30" fill="#22c55e" fill-opacity="0.08"/>
    <text x="0" y="-2" text-anchor="middle" font-family="monospace" font-size="22" fill="#22c55e" font-weight="bold">11</text>
    <text x="0" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">resolved</text>
  </g>

  <!-- Unresolved imports (right side) -->
  <g transform="translate(430, 370)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="4.5s" fill="freeze"/>

    <text x="0" y="0" font-family="monospace" font-size="11" fill="#6b7280" font-weight="bold" letter-spacing="2">UNRESOLVED</text>

    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="260" height="22" rx="4" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.3">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="monospace" font-size="11" fill="#f87171">import dynamic_plugin</text>
      <text x="250" y="15" text-anchor="end" font-family="monospace" font-size="12" fill="#ef4444" font-weight="bold">MISS</text>
    </g>

    <!-- Unresolved count badge -->
    <g transform="translate(280, 32)">
      <circle cx="0" cy="0" r="18" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="16" fill="#ef4444" font-weight="bold">1</text>
    </g>

    <!-- Formula -->
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="340" height="50" rx="6" fill="#0f1629" stroke="#374151" stroke-width="0.5"/>
      <text x="170" y="20" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">confidence = resolved / total</text>
      <text x="170" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">
        = 11 / 12 = <tspan font-size="16">0.92</tspan>
      </text>
    </g>

    <!-- External deps (informational) -->
    <g transform="translate(0, 140)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#4a5568">external (excluded from score):</text>
      <text x="0" y="18" font-family="monospace" font-size="11" fill="#374151">flask, werkzeug, jinja2</text>
    </g>

    <!-- Confidence note -->
    <g transform="translate(0, 178)">
      <rect x="0" y="0" width="340" height="28" rx="4" fill="#f59e0b" fill-opacity="0.05" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="8" y="18" font-family="monospace" font-size="11" fill="#fbbf24">
        "1 of 12 internal imports unresolved"
      </text>
    </g>
  </g>

  <text x="400" y="590" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e293b" letter-spacing="3">CONTEXTCEPTION</text>
</svg>