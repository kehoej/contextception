<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#0a0e1a">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-fire" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ef4444" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heat-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#111830" stroke-width="0.3"/>
    </pattern>
    <radialGradient id="heat-spot-hot">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat-spot-warm">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat-spot-cool">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#grid)" opacity="0.5"/>

  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a5568" font-weight="bold" letter-spacing="5">
    HOTSPOT DETECTION
  </text>
  <text x="400" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" letter-spacing="2">
    HIGH CHURN + HIGH FAN-IN = RISK
  </text>

  <!-- ═══ SCATTER PLOT: X=Churn, Y=Fan-in ═══ -->
  <g transform="translate(100, 80)">
    <!-- Axes -->
    <line x1="0" y1="380" x2="580" y2="380" stroke="#374151" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="380" stroke="#374151" stroke-width="1"/>

    <!-- X-axis label -->
    <text x="290" y="415" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">GIT CHURN (recent modifications)</text>
    <!-- Y-axis label -->
    <text x="-40" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280" transform="rotate(-90, -40, 190)">FAN-IN (importers)</text>

    <!-- Grid lines -->
    <g stroke="#1e293b" stroke-width="0.5" stroke-dasharray="4,4">
      <line x1="0" y1="95" x2="580" y2="95"/>
      <line x1="0" y1="190" x2="580" y2="190"/>
      <line x1="0" y1="285" x2="580" y2="285"/>
      <line x1="145" y1="0" x2="145" y2="380"/>
      <line x1="290" y1="0" x2="290" y2="380"/>
      <line x1="435" y1="0" x2="435" y2="380"/>
    </g>

    <!-- Scale markers -->
    <text x="-8" y="384" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5568">0</text>
    <text x="-8" y="289" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5568">5</text>
    <text x="-8" y="194" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5568">10</text>
    <text x="-8" y="99" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5568">15</text>
    <text x="-8" y="4" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5568">20</text>

    <text x="145" y="400" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a5568">5</text>
    <text x="290" y="400" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a5568">10</text>
    <text x="435" y="400" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a5568">15</text>
    <text x="580" y="400" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a5568">20</text>

    <!-- DANGER ZONE (top-right quadrant highlight) -->
    <rect x="290" y="0" width="290" height="190" rx="0" fill="#ef4444" fill-opacity="0" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="4s" fill="freeze"/>
      <animate attributeName="fill-opacity" values="0;0.04" dur="0.5s" begin="4s" fill="freeze"/>
    </rect>
    <rect x="290" y="0" width="290" height="190" rx="0" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4" opacity="0">
      <animate attributeName="opacity" values="0;0.3" dur="0.5s" begin="4s" fill="freeze"/>
    </rect>
    <text x="435" y="-8" text-anchor="middle" font-family="monospace" font-size="12" fill="#ef4444" font-weight="bold" opacity="0">
      HOTSPOT ZONE
      <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="4.2s" fill="freeze"/>
    </text>

    <!-- Heat blob backgrounds (appear behind dots) -->
    <circle cx="480" cy="50" r="0" fill="url(#heat-spot-hot)" filter="url(#heat-blur)" opacity="0.6">
      <animate attributeName="r" values="0;80" dur="1s" begin="3s" fill="freeze"/>
    </circle>
    <circle cx="400" cy="130" r="0" fill="url(#heat-spot-hot)" filter="url(#heat-blur)" opacity="0.4">
      <animate attributeName="r" values="0;60" dur="0.8s" begin="3.2s" fill="freeze"/>
    </circle>
    <circle cx="320" cy="210" r="0" fill="url(#heat-spot-warm)" filter="url(#heat-blur)" opacity="0.3">
      <animate attributeName="r" values="0;50" dur="0.7s" begin="3.4s" fill="freeze"/>
    </circle>

    <!-- ═══ DATA POINTS ═══ -->

    <!-- Cool files (low churn, low fan-in) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
      <circle cx="40" cy="350" r="4" fill="#06b6d4" opacity="0.4"><animate attributeName="r" values="0;4" dur="0.2s" begin="1s" fill="freeze"/></circle>
      <circle cx="80" cy="330" r="3" fill="#06b6d4" opacity="0.4"><animate attributeName="r" values="0;3" dur="0.2s" begin="1.1s" fill="freeze"/></circle>
      <circle cx="60" cy="310" r="5" fill="#06b6d4" opacity="0.4"><animate attributeName="r" values="0;5" dur="0.2s" begin="1.2s" fill="freeze"/></circle>
      <circle cx="120" cy="340" r="3" fill="#06b6d4" opacity="0.4"><animate attributeName="r" values="0;3" dur="0.2s" begin="1.3s" fill="freeze"/></circle>
      <circle cx="100" cy="360" r="4" fill="#06b6d4" opacity="0.4"><animate attributeName="r" values="0;4" dur="0.2s" begin="1.4s" fill="freeze"/></circle>
    </g>

    <!-- Moderate files -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
      <circle cx="160" cy="260" r="5" fill="#f59e0b" opacity="0.5"><animate attributeName="r" values="0;5" dur="0.2s" begin="1.5s" fill="freeze"/></circle>
      <circle cx="200" cy="230" r="6" fill="#f59e0b" opacity="0.5"><animate attributeName="r" values="0;6" dur="0.2s" begin="1.6s" fill="freeze"/></circle>
      <circle cx="250" cy="250" r="4" fill="#f59e0b" opacity="0.5"><animate attributeName="r" values="0;4" dur="0.2s" begin="1.7s" fill="freeze"/></circle>
      <circle cx="220" cy="280" r="5" fill="#f59e0b" opacity="0.5"><animate attributeName="r" values="0;5" dur="0.2s" begin="1.8s" fill="freeze"/></circle>
      <circle cx="180" cy="300" r="4" fill="#f59e0b" opacity="0.4"><animate attributeName="r" values="0;4" dur="0.2s" begin="1.9s" fill="freeze"/></circle>
      <circle cx="300" cy="270" r="5" fill="#f59e0b" opacity="0.5"><animate attributeName="r" values="0;5" dur="0.2s" begin="2s" fill="freeze"/></circle>
    </g>

    <!-- High-churn but low fan-in (bottom right) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.2s" fill="freeze"/>
      <circle cx="420" cy="340" r="4" fill="#f97316" opacity="0.5"><animate attributeName="r" values="0;4" dur="0.2s" begin="2.2s" fill="freeze"/></circle>
      <circle cx="460" cy="320" r="5" fill="#f97316" opacity="0.5"><animate attributeName="r" values="0;5" dur="0.2s" begin="2.3s" fill="freeze"/></circle>
      <circle cx="500" cy="350" r="3" fill="#f97316" opacity="0.4"><animate attributeName="r" values="0;3" dur="0.2s" begin="2.4s" fill="freeze"/></circle>
    </g>

    <!-- High fan-in but low churn (top left) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
      <circle cx="60" cy="100" r="6" fill="#a855f7" opacity="0.5"><animate attributeName="r" values="0;6" dur="0.2s" begin="2.5s" fill="freeze"/></circle>
      <circle cx="90" cy="140" r="5" fill="#a855f7" opacity="0.5"><animate attributeName="r" values="0;5" dur="0.2s" begin="2.6s" fill="freeze"/></circle>
      <circle cx="40" cy="170" r="4" fill="#a855f7" opacity="0.4"><animate attributeName="r" values="0;4" dur="0.2s" begin="2.7s" fill="freeze"/></circle>
    </g>

    <!-- ═══ HOTSPOT FILES (top-right, big, pulsing) ═══ -->

    <!-- utils.ts — THE HOTSPOT -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3s" fill="freeze"/>
      <!-- Pulsing ring -->
      <circle cx="480" cy="50" r="12" fill="none" stroke="#ef4444" stroke-width="1" opacity="0">
        <animate attributeName="r" values="12;30" dur="1.5s" begin="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0" dur="1.5s" begin="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="480" cy="50" r="12" fill="#ef4444" filter="url(#glow-fire)">
        <animate attributeName="r" values="0;14;12" dur="0.5s" begin="3s" fill="freeze"/>
      </circle>
      <text x="480" y="35" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5" font-weight="bold" opacity="0">
        utils.ts
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.3s" fill="freeze"/>
      </text>
      <text x="480" y="75" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444" opacity="0">
        churn:18 fan-in:17
        <animate attributeName="opacity" values="0;0.7" dur="0.2s" begin="3.5s" fill="freeze"/>
      </text>
    </g>

    <!-- config.ts — second hotspot -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.3s" fill="freeze"/>
      <circle cx="400" cy="130" r="10" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0">
        <animate attributeName="r" values="10;25" dur="1.5s" begin="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0" dur="1.5s" begin="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="400" cy="130" r="10" fill="#f97316" filter="url(#glow)">
        <animate attributeName="r" values="0;12;10" dur="0.5s" begin="3.3s" fill="freeze"/>
      </circle>
      <text x="400" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#fb923c" font-weight="bold" opacity="0">
        config.ts
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="3.5s" fill="freeze"/>
      </text>
      <text x="400" y="155" text-anchor="middle" font-family="monospace" font-size="10" fill="#f97316" opacity="0">
        churn:13 fan-in:12
        <animate attributeName="opacity" values="0;0.7" dur="0.2s" begin="3.7s" fill="freeze"/>
      </text>
    </g>

    <!-- types.ts — borderline hotspot -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="3.5s" fill="freeze"/>
      <circle cx="320" cy="170" r="8" fill="#f59e0b" filter="url(#glow)">
        <animate attributeName="r" values="0;9;8" dur="0.5s" begin="3.5s" fill="freeze"/>
      </circle>
      <text x="320" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24" opacity="0">
        types.ts
        <animate attributeName="opacity" values="0;0.8" dur="0.2s" begin="3.7s" fill="freeze"/>
      </text>
    </g>
  </g>

  <!-- ═══ HOTSPOT LIST (bottom) ═══ -->
  <g transform="translate(100, 510)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="5s" fill="freeze"/>

    <rect x="0" y="0" width="600" height="60" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.3"/>

    <text x="15" y="18" font-family="monospace" font-size="10" fill="#ef4444" font-weight="bold">hotspots:</text>

    <!-- Hotspot entries -->
    <g transform="translate(110, 8)">
      <rect x="0" y="0" width="130" height="18" rx="4" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="0.5">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="65" y="13" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5" font-weight="bold">src/utils.ts</text>
    </g>
    <g transform="translate(250, 8)">
      <rect x="0" y="0" width="130" height="18" rx="4" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-width="0.5"/>
      <text x="65" y="13" text-anchor="middle" font-family="monospace" font-size="11" fill="#fb923c" font-weight="bold">src/config.ts</text>
    </g>

    <text x="15" y="48" font-family="monospace" font-size="11" fill="#6b7280">
      modified often + imported by many = small changes have outsized impact
    </text>
  </g>

  <text x="400" y="590" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e293b" letter-spacing="3">CONTEXTCEPTION</text>
</svg>