<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" style="background:#0a0e1a">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#111830" stroke-width="0.3"/>
    </pattern>
    <linearGradient id="speed-trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="80%" stop-color="#00ff88" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="780" fill="url(#grid)" opacity="0.4"/>

  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a5568" font-weight="bold" letter-spacing="5">
    PERFORMANCE BENCHMARKS
  </text>
  <text x="450" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#374151" letter-spacing="2">
    REAL-WORLD REPOS — VALIDATED AT SCALE
  </text>

  <!-- ═══ LARGE CENTER METRIC: SUB-SECOND ═══ -->
  <g transform="translate(450, 140)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>

    <!-- Speed trail streak effect -->
    <rect x="-250" y="-25" width="0" height="50" rx="6" fill="url(#speed-trail)" opacity="0.3">
      <animate attributeName="width" values="0;500" dur="0.8s" begin="0.8s" fill="freeze"/>
    </rect>

    <!-- Flash on arrival -->
    <circle cx="0" cy="0" r="0" fill="#00ff88" opacity="0">
      <animate attributeName="r" values="0;60;0" dur="0.5s" begin="1.5s" fill="freeze"/>
      <animate attributeName="opacity" values="0;0.3;0" dur="0.5s" begin="1.5s" fill="freeze"/>
    </circle>

    <text x="0" y="15" text-anchor="middle" font-family="monospace" font-size="56" fill="#00ff88" font-weight="bold" filter="url(#glow-green)" opacity="0">
      &lt;1s
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
    </text>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80" opacity="0">
      analysis time on any repo
      <animate attributeName="opacity" values="0;0.7" dur="0.3s" begin="1.6s" fill="freeze"/>
    </text>
  </g>

  <!-- ═══ BENCHMARK BARS (3 real repos) ═══ -->
  <g transform="translate(60, 200)">

    <!-- Header -->
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#6b7280" font-weight="bold" letter-spacing="2" opacity="0">
      INDEXING BENCHMARKS
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
    </text>

    <!-- Bar labels (right-aligned) -->
    <g font-family="monospace" font-size="10" fill="#6b7280">
      <!-- Repo 1: Cal.com -->
      <g transform="translate(0, 30)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>

        <text x="140" y="14" text-anchor="end" fill="#06b6d4" font-weight="bold">Cal.com</text>
        <text x="140" y="28" text-anchor="end" fill="#4a5568" font-size="11">7,366 files</text>

        <!-- Bar background -->
        <rect x="155" y="0" width="600" height="32" rx="4" fill="#1e293b"/>
        <!-- Bar fill (animated) -->
        <rect x="155" y="0" width="0" height="32" rx="4" fill="#06b6d4" fill-opacity="0.3" stroke="#06b6d4" stroke-width="0.5">
          <animate attributeName="width" values="0;540" dur="1.2s" begin="2.5s" fill="freeze"/>
        </rect>
        <!-- Moving glow on bar -->
        <rect x="155" y="0" width="30" height="32" rx="4" fill="#06b6d4" fill-opacity="0.3" opacity="0">
          <animate attributeName="x" values="155;665" dur="1.2s" begin="2.5s" fill="freeze"/>
          <animate attributeName="opacity" values="0;0.5;0" dur="1.2s" begin="2.5s" fill="freeze"/>
        </rect>
        <!-- Time label -->
        <text x="710" y="20" font-family="monospace" font-size="14" fill="#06b6d4" font-weight="bold" opacity="0">
          2.8s
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.5s" fill="freeze"/>
        </text>
      </g>

      <!-- Repo 2: Zulip -->
      <g transform="translate(0, 80)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.6s" fill="freeze"/>

        <text x="140" y="14" text-anchor="end" fill="#a855f7" font-weight="bold">Zulip</text>
        <text x="140" y="28" text-anchor="end" fill="#4a5568" font-size="11">2,638 files</text>

        <rect x="155" y="0" width="600" height="32" rx="4" fill="#1e293b"/>
        <rect x="155" y="0" width="0" height="32" rx="4" fill="#a855f7" fill-opacity="0.3" stroke="#a855f7" stroke-width="0.5">
          <animate attributeName="width" values="0;200" dur="0.8s" begin="2.8s" fill="freeze"/>
        </rect>
        <rect x="155" y="0" width="30" height="32" rx="4" fill="#a855f7" fill-opacity="0.3" opacity="0">
          <animate attributeName="x" values="155;325" dur="0.8s" begin="2.8s" fill="freeze"/>
          <animate attributeName="opacity" values="0;0.5;0" dur="0.8s" begin="2.8s" fill="freeze"/>
        </rect>
        <text x="370" y="20" font-family="monospace" font-size="14" fill="#a855f7" font-weight="bold" opacity="0">
          0.9s
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.5s" fill="freeze"/>
        </text>
      </g>

      <!-- Repo 3: Excalidraw -->
      <g transform="translate(0, 130)" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.9s" fill="freeze"/>

        <text x="140" y="14" text-anchor="end" fill="#f97316" font-weight="bold">Excalidraw</text>
        <text x="140" y="28" text-anchor="end" fill="#4a5568" font-size="11">602 files</text>

        <rect x="155" y="0" width="600" height="32" rx="4" fill="#1e293b"/>
        <rect x="155" y="0" width="0" height="32" rx="4" fill="#f97316" fill-opacity="0.3" stroke="#f97316" stroke-width="0.5">
          <animate attributeName="width" values="0;80" dur="0.5s" begin="3.1s" fill="freeze"/>
        </rect>
        <rect x="155" y="0" width="20" height="32" rx="4" fill="#f97316" fill-opacity="0.3" opacity="0">
          <animate attributeName="x" values="155;215" dur="0.5s" begin="3.1s" fill="freeze"/>
          <animate attributeName="opacity" values="0;0.5;0" dur="0.5s" begin="3.1s" fill="freeze"/>
        </rect>
        <text x="248" y="20" font-family="monospace" font-size="14" fill="#f97316" font-weight="bold" opacity="0">
          0.3s
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.5s" fill="freeze"/>
        </text>
      </g>
    </g>

    <!-- Scale -->
    <g transform="translate(155, 175)" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="3.5s" fill="freeze"/>
      <line x1="0" y1="0" x2="600" y2="0" stroke="#374151" stroke-width="0.5"/>
      <text x="0" y="14" font-family="monospace" font-size="10" fill="#4a5568">0s</text>
      <text x="200" y="14" font-family="monospace" font-size="10" fill="#4a5568">1s</text>
      <text x="400" y="14" font-family="monospace" font-size="10" fill="#4a5568">2s</text>
      <text x="600" y="14" font-family="monospace" font-size="10" fill="#4a5568">3s</text>
    </g>
  </g>

  <!-- ═══ ANALYSIS SPEED (separate section) ═══ -->
  <g transform="translate(60, 440)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#6b7280" font-weight="bold" letter-spacing="2" opacity="0">
      ANALYSIS SPEED (post-index)
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4s" fill="freeze"/>
    </text>

    <!-- Ultra-fast analysis bars -->
    <g transform="translate(0, 20)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.2s" fill="freeze"/>

      <!-- Single file analysis -->
      <text x="140" y="14" text-anchor="end" font-family="monospace" font-size="12" fill="#22c55e">single file</text>
      <rect x="155" y="0" width="600" height="24" rx="4" fill="#1e293b"/>
      <rect x="155" y="0" width="0" height="24" rx="4" fill="#22c55e" fill-opacity="0.4" stroke="#22c55e" stroke-width="0.5">
        <animate attributeName="width" values="0;50" dur="0.3s" begin="4.4s" fill="freeze"/>
      </rect>
      <!-- Speed trail -->
      <rect x="155" y="4" width="0" height="16" rx="3" fill="url(#speed-trail)" opacity="0.5">
        <animate attributeName="width" values="0;50;0" dur="0.4s" begin="4.4s" fill="freeze"/>
      </rect>
      <text x="218" y="16" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold" filter="url(#glow-green)" opacity="0">
        87ms
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="4.7s" fill="freeze"/>
      </text>
    </g>

    <g transform="translate(0, 52)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.5s" fill="freeze"/>

      <!-- Multi file analysis -->
      <text x="140" y="14" text-anchor="end" font-family="monospace" font-size="12" fill="#4ade80">multi file (3)</text>
      <rect x="155" y="0" width="600" height="24" rx="4" fill="#1e293b"/>
      <rect x="155" y="0" width="0" height="24" rx="4" fill="#4ade80" fill-opacity="0.3" stroke="#4ade80" stroke-width="0.5">
        <animate attributeName="width" values="0;90" dur="0.3s" begin="4.7s" fill="freeze"/>
      </rect>
      <rect x="155" y="4" width="0" height="16" rx="3" fill="url(#speed-trail)" opacity="0.4">
        <animate attributeName="width" values="0;90;0" dur="0.4s" begin="4.7s" fill="freeze"/>
      </rect>
      <text x="258" y="16" font-family="monospace" font-size="12" fill="#4ade80" font-weight="bold" opacity="0">
        142ms
        <animate attributeName="opacity" values="0;1" dur="0.2s" begin="5s" fill="freeze"/>
      </text>
    </g>

    <!-- Scale -->
    <g transform="translate(155, 88)" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="0.3s" begin="5s" fill="freeze"/>
      <line x1="0" y1="0" x2="600" y2="0" stroke="#374151" stroke-width="0.5"/>
      <text x="0" y="14" font-family="monospace" font-size="10" fill="#4a5568">0ms</text>
      <text x="200" y="14" font-family="monospace" font-size="10" fill="#4a5568">200ms</text>
      <text x="400" y="14" font-family="monospace" font-size="10" fill="#4a5568">400ms</text>
      <text x="600" y="14" font-family="monospace" font-size="10" fill="#4a5568">600ms</text>
    </g>
  </g>

  <!-- ═══ VALIDATION STATS (below analysis speed) ═══ -->
  <g transform="translate(300, 610)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="5.5s" fill="freeze"/>

    <rect x="0" y="0" width="290" height="130" rx="8" fill="#22c55e" fill-opacity="0.03" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>

    <text x="145" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e" font-weight="bold" letter-spacing="2">VALIDATION</text>

    <g transform="translate(20, 38)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#6b7280">benchmark score:</text>
      <text x="270" y="0" text-anchor="end" font-family="monospace" font-size="14" fill="#22c55e" font-weight="bold" filter="url(#glow-green)">4.00/4.00</text>
    </g>
    <g transform="translate(20, 58)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#6b7280">precision:</text>
      <text x="270" y="0" text-anchor="end" font-family="monospace" font-size="14" fill="#22c55e" font-weight="bold">100%</text>
    </g>
    <g transform="translate(20, 78)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#6b7280">repos validated:</text>
      <text x="270" y="0" text-anchor="end" font-family="monospace" font-size="14" fill="#06b6d4" font-weight="bold">16</text>
    </g>
    <g transform="translate(20, 98)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#6b7280">test fixtures:</text>
      <text x="270" y="0" text-anchor="end" font-family="monospace" font-size="14" fill="#a855f7" font-weight="bold">22 (100% pass)</text>
    </g>
    <g transform="translate(20, 118)">
      <text x="0" y="0" font-family="monospace" font-size="12" fill="#6b7280">scale tested:</text>
      <text x="270" y="0" text-anchor="end" font-family="monospace" font-size="12" fill="#fbbf24">7,366 files (no errors)</text>
    </g>
  </g>

  <text x="450" y="770" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e293b" letter-spacing="3">CONTEXTCEPTION</text>
</svg>